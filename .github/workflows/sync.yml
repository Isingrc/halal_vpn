name: Sync VPN Configs

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch and build config files
        run: |
          python3 << 'EOF'
          import urllib.request
          import re
          import subprocess
          from datetime import datetime
          from urllib.parse import unquote

          BASE = "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/"
          DATE = datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")

          # Файлы по группам
          WHITE_SOURCES = [
              "WHITE-CIDR-RU-all.txt",
              "WHITE-CIDR-RU-checked.txt",
              "WHITE-SNI-RU-all.txt",
              "Vless-Reality-White-Lists-Rus-Mobile.txt",
              "Vless-Reality-White-Lists-Rus-Mobile-2.txt",
          ]

          BLACK_SOURCES = [
              "BLACK_VLESS_RUS.txt",
              "BLACK_VLESS_RUS_mobile.txt",
              "BLACK_SS+All_RUS.txt",
          ]

          DOMAIN_FLAGS = {
              "google.com":     ("🇺🇸", "US"), "youtube.com":   ("🇺🇸", "US"),
              "github.com":     ("🇺🇸", "US"), "microsoft.com": ("🇺🇸", "US"),
              "cloudflare.com": ("🇺🇸", "US"), "apple.com":     ("🇺🇸", "US"),
              "discord.com":    ("🇩🇪", "DE"), "telegram.org":  ("🇩🇪", "DE"),
              "whatsapp.com":   ("🇩🇪", "DE"), "netflix.com":   ("🇳🇱", "NL"),
              "spotify.com":    ("🇸🇪", "SE"), "twitter.com":   ("🇺🇸", "US"),
              "twitch.tv":      ("🇺🇸", "US"), "instagram.com": ("🇩🇪", "DE"),
              "amazon.com":     ("🇺🇸", "US"), "bing.com":      ("🇺🇸", "US"),
          }

          PROTOCOLS = ("vless://", "vmess://", "trojan://", "ss://", "hysteria2://", "tuic://")

          def fetch(filename):
              try:
                  with urllib.request.urlopen(BASE + filename, timeout=20) as r:
                      return r.read().decode("utf-8").splitlines()
              except Exception as e:
                  print(f"  ERROR {filename}: {e}")
                  return []

          def is_vpn_line(line):
              return any(line.startswith(p) for p in PROTOCOLS)

          def get_domain(line):
              for param in ("sni=", "host="):
                  m = re.search(param + r'([a-zA-Z0-9._-]+\.[a-zA-Z]{2,})', line)
                  if m:
                      return m.group(1)
              return None

          def flag_for(domain):
              if not domain:
                  return ("🌐", "XX")
              for known, (flag, code) in DOMAIN_FLAGS.items():
                  if known in domain:
                      return (flag, code)
              return ("🌐", "XX")

          def get_ip(line):
              """Извлекаем IP или хост сервера для пинга."""
              try:
                  m = re.search(r'@([a-zA-Z0-9._-]+):', line)
                  if m:
                      return m.group(1)
              except:
                  pass
              return None

          def ping_via_telegram(host):
            tg_check_url = "https://t.me"
            try:
                result=subprocess.run(
                [
                "curl",
                "-o", "/dev/null",
                "-s",
                "-w", "%{time_total}",
                "--max-time", "5","--connect-timeout", "3",
                "--resolve", f"t.me:443:{host}",
                "https://t.me"
                ],
                capture_output=True, text=True, timeout=10
                )
                val = result.stdout.strip()
                if val:
                    ms=float(val)*1000
                    return ms
            except:
                pass
            
            try:
                result=subprocess.run(
                ["ping", "-c", "2", "-W", host],
                capture_output=True, text=True, timeout=8
                )
                for line in result.stdout.split("\n"):
                    if "avg" in line or "rtt" in line:
                        parts = line.split("/")
                        if len(parts) >= 5:
                            return float(parts[4])
            except:
                pass
            
            return 9999.0

          def sort_by_ping(lines, max_servers=50):
              """Сортируем первые max_servers серверов по пингу."""
              candidates = lines[:max_servers]
              scored = []
              for line in candidates:
                  host = get_ip(line)
                  if host:
                      p = ping_via_telegram(host)
                      print(f"{host}: {p}ms")
                  else:
                      p = 9999.0
                  scored.append((p, line))
              scored.sort(key=lambda x: x[0])
              rest = lines[max_servers:]
              return [l for _, l in scored] + rest

          def fetch_group(sources):
              """Загружаем и объединяем несколько файлов, фильтруем только VPN ключи."""
              all_lines = []
              seen = set()
              for filename in sources:
                  print(f"  Fetching {filename}...")
                  lines = fetch(filename)
                  for l in lines:
                      l = l.strip()
                      if not l or l.startswith("#"):
                          continue
                      if not is_vpn_line(l):
                          continue
                      base = re.sub(r'#.*$', '', l).strip()
                      if base not in seen:
                          seen.add(base)
                          all_lines.append(l)
              return all_lines

          def rename_line(line, name):
              line = re.sub(r'#.*$', '', line).rstrip()
              return line + "#" + name

          def build_group(lines, label, count):
              """Сортируем по пингу и берём top N."""
              print(f"  Sorting {len(lines)} servers by ping...")
              sorted_lines = sort_by_ping(lines, max_servers=min(30, len(lines)))
              top = sorted_lines[:count]
              result = []
              for i, line in enumerate(top, 1):
                  domain = get_domain(line)
                  flag, country = flag_for(domain)
                  name = f"{flag} {country} | {label} #{i}"
                  result.append(rename_line(line, name))
              return result

          def make_auto(line, label):
              base = re.sub(r'#.*$', '', line).rstrip()
              return base + f"#🚀 Автовыбор | {label}"

          def write_file(path, header, white, black, fast):
              total = len(white) + len(black) + len(fast)
              with open(path, "w", encoding="utf-8") as f:
                  f.write(f"# {header}\n")
                  f.write(f"# Updated: {DATE}\n")
                  f.write(f"# Total: {total} servers\n\n")

                  if white:
                      f.write("# ═══ ⚪ БЕЛЫЕ СЕРВЕРЫ ═══\n")
                      f.write(make_auto(white[0], "⚪ Белые") + "\n")
                      f.write("\n".join(white) + "\n\n")

                  if black:
                      f.write("# ═══ ⚫ ЧЁРНЫЕ СЕРВЕРЫ ═══\n")
                      f.write(make_auto(black[0], "⚫ Чёрные") + "\n")
                      f.write("\n".join(black) + "\n\n")

                  if fast:
                      f.write("# ═══ ⚡ FAST ALL ═══\n")
                      f.write(make_auto(fast[0], "⚡ Fast All") + "\n")
                      f.write("\n".join(fast) + "\n")

          # ── Загружаем группы ──────────────────────────────────────
          print("Fetching WHITE sources...")
          white_raw = fetch_group(WHITE_SOURCES)
          print(f"  WHITE raw: {len(white_raw)} unique VPN keys")

          print("Fetching BLACK sources...")
          black_raw = fetch_group(BLACK_SOURCES)
          print(f"  BLACK raw: {len(black_raw)} unique VPN keys")

          # ── Сортируем по пингу и берём top N ─────────────────────
          print("Building WHITE group (top 10)...")
          white = build_group(white_raw, "⚪ Белый", 10)

          print("Building BLACK group (top 10)...")
          black = build_group(black_raw, "⚫ Чёрный", 10)

          print("Building FAST ALL group (top 15)...")
          all_raw_seen = set()
          all_raw = []
          for l in white_raw + black_raw:
              base = re.sub(r'#.*$', '', l).strip()
              if base not in all_raw_seen:
                  all_raw_seen.add(base)
                  all_raw.append(l)
          fast = build_group(all_raw, "⚡ Fast", 15)

          # ── Записываем 3 файла ────────────────────────────────────
          print("Writing files...")
          write_file("white_servers.txt", "WHITE SERVERS", white, [], [])
          write_file("black_servers.txt", "BLACK SERVERS", [], black, [])
          write_file("fast_servers.txt",  "FAST ALL SERVERS", white, black, fast)

          print(f"\nDone!")
          print(f"  ⚪ white_servers.txt : {len(white)} servers")
          print(f"  ⚫ black_servers.txt : {len(black)} servers")
          print(f"  ⚡ fast_servers.txt  : {len(fast)} servers (+ {len(white)}+{len(black)} from groups)")
          EOF

      - name: Commit changes
        run: |
          git config user.email "bot@vpnservice.local"
          git config user.name "VPN Sync Bot"
          git add white_servers.txt black_servers.txt fast_servers.txt
          git diff --staged --quiet || git commit -m "sync: $(date '+%Y-%m-%d %H:%M UTC')"
          git push
