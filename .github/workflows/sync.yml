name: Sync VPN Configs

on:
  schedule:
    - cron: '0 */2 * * *'   # каждые 2 часа
  workflow_dispatch:          # или вручную

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch, parse and rename configs
        run: |
          python3 << 'EOF'
          import urllib.request
          import re
          from datetime import datetime
          from urllib.parse import unquote

          BASE = "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/"
          DATE = datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")

          SOURCES = {
              "white1":  "Vless-Reality-White-Lists-Rus-Mobile.txt",
              "white2":  "Vless-Reality-White-Lists-Rus-Mobile-2.txt",
              "black":   "BLACK_VLESS_RUS_mobile.txt",
              "ss_all":  "BLACK_SS+All_RUS.txt",
          }

          DOMAIN_FLAGS = {
              "google.com":     ("🇺🇸", "US"), "youtube.com":   ("🇺🇸", "US"),
              "github.com":     ("🇺🇸", "US"), "microsoft.com": ("🇺🇸", "US"),
              "cloudflare.com": ("🇺🇸", "US"), "apple.com":     ("🇺🇸", "US"),
              "discord.com":    ("🇩🇪", "DE"), "telegram.org":  ("🇩🇪", "DE"),
              "whatsapp.com":   ("🇩🇪", "DE"), "netflix.com":   ("🇳🇱", "NL"),
              "spotify.com":    ("🇸🇪", "SE"), "twitter.com":   ("🇺🇸", "US"),
              "twitch.tv":      ("🇺🇸", "US"), "instagram.com": ("🇩🇪", "DE"),
              "amazon.com":     ("🇺🇸", "US"), "bing.com":      ("🇺🇸", "US"),
          }

          def fetch(filename):
              try:
                  with urllib.request.urlopen(BASE + filename, timeout=20) as r:
                      return r.read().decode("utf-8").splitlines()
              except Exception as e:
                  print(f"ERROR {filename}: {e}")
                  return []

          def get_domain(line):
              for param in ("sni=", "host="):
                  m = re.search(param + r'([a-zA-Z0-9._-]+\.[a-zA-Z]{2,})', line)
                  if m:
                      return m.group(1)
              return None

          def flag_for(domain):
              if not domain:
                  return ("🌐", "XX")
              for known, (flag, code) in DOMAIN_FLAGS.items():
                  if known in domain:
                      return (flag, code)
              return ("🌐", "XX")

          def rename_line(line, name):
              """Убираем старое имя и ставим новое."""
              line = re.sub(r'#.*$', '', line).rstrip()
              return line + "#" + name

          def make_name(flag, country, label, idx):
              return f"{flag} {country} | {label} {idx}"

          def process_lines(lines):
              """Фильтруем пустые строки и комментарии."""
              return [l.strip() for l in lines if l.strip() and not l.startswith("#")]

          def get_top(lines, count):
              """Берём первые N уникальных серверов."""
              seen = set()
              result = []
              for l in lines:
                  base = re.sub(r'#.*$', '', l).strip()
                  if base not in seen:
                      seen.add(base)
                      result.append(l)
                  if len(result) >= count:
                      break
              return result

          def build_category(lines, count, label, category_flag):
              """Строим категорию из N серверов с переименованием."""
              top = get_top(lines, count)
              result = []
              for i, line in enumerate(top, 1):
                  domain = get_domain(line)
                  flag, country = flag_for(domain)
                  name = f"{flag} {country} | {label} #{i}"
                  result.append(rename_line(line, name))
              return result

          print("Fetching sources...")
          data = {k: fetch(v) for k, v in SOURCES.items()}

          # Обрабатываем исходные списки
          white_lines = process_lines(data["white1"] + data["white2"])
          black_lines = process_lines(data["black"])
          ss_lines    = process_lines(data["ss_all"])
          all_lines   = process_lines(
              data["white1"] + data["white2"] + data["black"] + data["ss_all"]
          )

          # ── Категория 1: Белые (10 серверов) ─────────────────────────────
          white_servers = build_category(white_lines, 10, "⚪ Белый список", "⚪")

          # Автовыбор для белых
          if white_servers:
              auto_white = re.sub(r'#.*$', '', white_servers[0]).rstrip()
              auto_white += "#🚀 Автовыбор | ⚪ Белые"
              white_block = [auto_white] + white_servers
          else:
              white_block = []

          # ── Категория 2: Чёрные (10 серверов) ────────────────────────────
          black_servers = build_category(black_lines + ss_lines, 10, "⚫ Чёрный список", "⚫")

          if black_servers:
              auto_black = re.sub(r'#.*$', '', black_servers[0]).rstrip()
              auto_black += "#🚀 Автовыбор | ⚫ Чёрные"
              black_block = [auto_black] + black_servers
          else:
              black_block = []

          # ── Категория 3: Быстрые все (15 серверов) ───────────────────────
          fast_servers = build_category(all_lines, 15, "⚡ Fast All", "?")

          if fast_servers:
              auto_fast = re.sub(r'#.*$', '', fast_servers[0]).rstrip()
              auto_fast += "#🚀 Автовыбор | ⚡ Fast All"
              fast_block = [auto_fast] + fast_servers
          else:
              fast_block = []

          # ── Собираем итоговый файл ────────────────────────────────────────
          final = (
              ["# ═══ ⚪ БЕЛЫЕ СЕРВЕРЫ ═══"] +
              white_block +
              ["", "# ═══ ⚫ ЧЁРНЫЕ СЕРВЕРЫ ═══"] +
              black_block +
              ["", "# ═══ ⚡ FAST ALL ═══"] +
              fast_block
          )

          with open("happ.txt", "w", encoding="utf-8") as f:
              f.write(f"# VPN Config | Updated: {DATE}\n")
              f.write(f"# White: {len(white_servers)} | Black: {len(black_servers)} | Fast: {len(fast_servers)}\n\n")
              f.write("\n".join(final))

          print(f"happ.txt written:")
          print(f"  ⚪ White:  {len(white_servers)} servers")
          print(f"  ⚫ Black:  {len(black_servers)} servers")
          print(f"  ⚡ Fast:   {len(fast_servers)} servers")
          print("Done!")
          EOF

      - name: Commit changes
        run: |
          git config user.email "bot@vpnservice.local"
          git config user.name "VPN Sync Bot"
          git add *.txt
          git diff --staged --quiet || git commit -m "sync: $(date '+%Y-%m-%d %H:%M UTC')"
          git push
