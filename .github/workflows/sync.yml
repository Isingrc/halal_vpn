name: Sync VPN Configs

on:
  schedule:
    - cron: '0 */2 * * *'   # каждые 2 часа (как у источника)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch and build config files
        run: |
          python3 << 'EOF'
          import urllib.request
import re
from datetime import datetime

BASE  = "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/"
DATE  = datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")

SOURCES = {
    "vless_mobile":  "BLACK_VLESS_RUS_mobile.txt",
    "ss_all":        "BLACK_SS+All_RUS.txt",
}

DOMAIN_FLAGS = {
    "google.com":      ("🇺🇸", "US"), "youtube.com":    ("🇺🇸", "US"),
    "github.com":      ("🇺🇸", "US"), "microsoft.com":  ("🇺🇸", "US"),
    "cloudflare.com":  ("🇺🇸", "US"), "apple.com":      ("🇺🇸", "US"),
    "discord.com":     ("🇩🇪", "DE"), "telegram.org":   ("🇩🇪", "DE"),
    "whatsapp.com":    ("🇩🇪", "DE"), "netflix.com":    ("🇳🇱", "NL"),
    "spotify.com":     ("🇸🇪", "SE"), "twitter.com":    ("🇺🇸", "US"),
    "twitch.tv":       ("🇺🇸", "US"), "instagram.com":  ("🇩🇪", "DE"),
}

def fetch(filename):
    try:
        with urllib.request.urlopen(BASE + filename, timeout=20) as r:
            return r.read().decode("utf-8").splitlines()
    except Exception as e:
        print(f"ERROR {filename}: {e}")
        return []

def get_domain(line):
    for param in ("sni=", "host="):
        m = re.search(param + r'([a-zA-Z0-9._-]+\.[a-zA-Z]{2,})', line)
        if m:
            return m.group(1)
    return None

def flag_for(domain):
    if not domain:
        return ("🌐", "XX")
    for known, (flag, code) in DOMAIN_FLAGS.items():
        if known in domain:
            return (flag, code)
    return ("🌐", "XX")

def clean_name(name):
    """Убираем URL-encoded символы и мусор из названия."""
    try:
        from urllib.parse import unquote
        name = unquote(name)
    except:
        pass
    # Убираем эмодзи и спецсимволы кроме пробела тире и точки
    name = re.sub(r'[^\w\s\-.]', '', name, flags=re.UNICODE)
    name = re.sub(r'\s+', ' ', name).strip()
    return name

def rename_line(line, idx, label="⚫"):
    """Переименовывает сервер с флагом и чистым именем."""
    if not line or line.startswith("#"):
        return line

    domain = get_domain(line)
    flag, country = flag_for(domain)

    # Формируем чистое имя
    new_name = f"{flag} {country}"
    if domain:
        new_name += f" {domain}"
    new_name += f" {label} {idx+1}"

    # Убираем старое имя и ставим новое
    line = re.sub(r'#.*$', '', line).rstrip()
    return line + "#" + new_name

def process(lines, label):
    result = []
    for i, l in enumerate(lines):
        l = l.strip()
        if not l or l.startswith("#"):
            continue
        result.append(rename_line(l, i, label))
    return list(dict.fromkeys(result))

def write(path, header, lines, add_auto=False):
    with open(path, "w", encoding="utf-8") as f:
        f.write(f"# {header}\n")
        f.write(f"# Updated: {DATE}\n")
        f.write(f"# Keys: {len(lines)}\n\n")
        if add_auto and lines:
            # Добавляем первый ключ как "автовыбор" с пометкой
            auto = re.sub(r'#.*$', '', lines[0]).rstrip()
            auto += "#🚀 Автовыбор (лучший пинг)"
            f.write(auto + "\n")
        f.write("\n".join(lines))
    print(f"{path}: {len(lines)} keys")

print("Fetching...")
data = {k: fetch(v) for k, v in SOURCES.items()}

mobile = process(data["vless_mobile"], "⚪")
ss     = process(data["ss_all"],       "⚫")
happ   = list(dict.fromkeys(mobile + ss))

write("happ.txt",         "HAPP CONFIG",   happ,   add_auto=True)
write("v2ray.txt",        "V2RAY CONFIG",  mobile, add_auto=True)
write("v2ray_mobile.txt", "V2RAY MOBILE",  mobile, add_auto=False)
write("all_keys.txt",     "ALL KEYS",      happ,   add_auto=True)

print("Done!")
          EOF

      - name: Commit changes
        run: |
          git config user.email "bot@example.com"
          git config user.name "VPN Sync Bot"
          git add *.txt
          git diff --staged --quiet || git commit -m "sync: $(date '+%Y-%m-%d %H:%M UTC')"
          git push
