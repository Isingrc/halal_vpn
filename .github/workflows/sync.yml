name: Sync VPN Configs

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch, ping-sort and build config files
        run: |
          python3 << 'EOF'
          import urllib.request
          import re
          import subprocess
          from datetime import datetime

          BASE = "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/"
          DATE = datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")

          WHITE_SOURCES = [
              "WHITE-CIDR-RU-all.txt",
              "WHITE-CIDR-RU-checked.txt",
              "WHITE-SNI-RU-all.txt",
              "Vless-Reality-White-Lists-Rus-Mobile.txt",
              "Vless-Reality-White-Lists-Rus-Mobile-2.txt",
          ]
          BLACK_SOURCES = [
              "BLACK_VLESS_RUS.txt",
              "BLACK_VLESS_RUS_mobile.txt",
              "BLACK_SS+All_RUS.txt",
          ]

          PROTOCOLS = ("vless://", "vmess://", "trojan://", "ss://", "hysteria2://", "tuic://")

          MAX_PER_GROUP = 55
          PING_DOMAIN   = "telegram.org"

          def fetch(filename):
              try:
                  with urllib.request.urlopen(BASE + filename, timeout=20) as r:
                      return r.read().decode("utf-8").splitlines()
              except Exception as e:
                  print(f"  ERROR {filename}: {e}")
                  return []

          def is_vpn_line(line):
              return any(line.startswith(p) for p in PROTOCOLS)

          def is_anycast(line):
              name_part = line.split("#", 1)[1] if "#" in line else ""
              return "anycast" in name_part.lower()

          def get_ip(line):
              m = re.search(r'@([a-zA-Z0-9._-]+):', line)
              return m.group(1) if m else None

          def ping_via_telegram(host):
              try:
                  result = subprocess.run(
                      ["curl", "-o", "/dev/null", "-s", "-w", "%{time_total}",
                       "--max-time", "5", "--connect-timeout", "3",
                       "--resolve", f"{PING_DOMAIN}:443:{host}",
                       f"https://{PING_DOMAIN}"],
                      capture_output=True, text=True, timeout=10
                  )
                  val = result.stdout.strip()
                  if val:
                      return float(val) * 1000
              except:
                  pass
              try:
                  result = subprocess.run(["ping", "-c", "2", "-W", "2", host],
                                           capture_output=True, text=True, timeout=10)
                  for line in result.stdout.split("\n"):
                      if "avg" in line or "rtt" in line:
                          parts = line.split("/")
                          if len(parts) >= 5:
                              return float(parts[4])
              except:
                  pass
              return 9999.0

          def sort_by_ping(lines, max_check=60):
              candidates = lines[:max_check]
              scored = []
              for line in candidates:
                  host = get_ip(line)
                  p = ping_via_telegram(host) if host else 9999.0
                  print(f"    {host} -> {PING_DOMAIN}: {p:.0f}ms")
                  scored.append((p, line))
              scored.sort(key=lambda x: x[0])
              rest = lines[max_check:]
              return [l for _, l in scored] + rest

          def fetch_group(sources, is_white=False):
              all_lines, seen = [], set()
              for filename in sources:
                  print(f"  Fetching {filename}...")
                  for l in fetch(filename):
                      l = l.strip()
                      if not l or l.startswith("#") or not is_vpn_line(l):
                          continue
                      if is_anycast(l):
                          continue

                      base = re.sub(r'#.*$', '', l).strip()
                      if base in seen:
                          continue
                      seen.add(base)

                      if is_white:
                          if "#" in l:
                              prefix, name = l.split("#", 1)
                              l = f"{prefix}#⚪ {name}"
                          else:
                              l = l + "#⚪"

                      all_lines.append(l)
              return all_lines

          MAX_REACHABLE_MS = 3000  # сервер считаем рабочим если ответил быстрее 3с

          def write_single(path, header, servers):
              """Каждый файл содержит ТОЛЬКО свою группу — без дублей из других."""
              with open(path, "w", encoding="utf-8") as f:
                  f.write(f"# {header}\n# Updated: {DATE}\n# Total: {len(servers)} servers\n\n")
                  f.write("\n".join(servers) + "\n")

          def sort_and_filter(lines, max_check=60, count=MAX_PER_GROUP):
              """
              Пингуем, отбрасываем неотвечающие (>= MAX_REACHABLE_MS считаем нерабочими),
              берём top `count` самых быстрых. Если рабочих меньше чем count — отдаём сколько есть.
              """
              candidates = lines[:max_check]
              scored = []
              for line in candidates:
                  host = get_ip(line)
                  p = ping_via_telegram(host) if host else 9999.0
                  print(f"    {host} -> {PING_DOMAIN}: {p:.0f}ms")
                  scored.append((p, line))

              # Оставляем только реально отвечающие сервера
              working = [(p, l) for p, l in scored if p < MAX_REACHABLE_MS]
              working.sort(key=lambda x: x[0])

              result = [l for _, l in working][:count]
              print(f"    Working: {len(working)}/{len(scored)} checked -> keeping top {len(result)}")
              return result

          print("Fetching WHITE sources...")
          white_raw = fetch_group(WHITE_SOURCES, is_white=True)
          print(f"  WHITE raw (after anycast filter): {len(white_raw)} keys")

          print("Fetching BLACK sources...")
          black_raw = fetch_group(BLACK_SOURCES, is_white=False)
          print(f"  BLACK raw (after anycast filter): {len(black_raw)} keys")

          print(f"Checking WHITE servers (max {MAX_PER_GROUP} working)...")
          white = sort_and_filter(white_raw, max_check=min(80, len(white_raw)), count=MAX_PER_GROUP)

          print(f"Checking BLACK servers (max {MAX_PER_GROUP} working)...")
          black = sort_and_filter(black_raw, max_check=min(80, len(black_raw)), count=MAX_PER_GROUP)

          print("Writing files...")
          write_single("white_servers.txt", "WHITE SERVERS", white)
          write_single("black_servers.txt", "BLACK SERVERS", black)

          # ── debug.txt — все сервера как они пришли из источника, без фильтрации по пингу ──
          with open("debug.txt", "w", encoding="utf-8") as f:
              f.write(f"# DEBUG — все сервера из источника (без ping-фильтра)\n")
              f.write(f"# Updated: {DATE}\n")
              f.write(f"# WHITE raw: {len(white_raw)} | BLACK raw: {len(black_raw)}\n\n")
              f.write("# === WHITE RAW ===\n")
              f.write("\n".join(white_raw) + "\n\n")
              f.write("# === BLACK RAW ===\n")
              f.write("\n".join(black_raw) + "\n")

          print(f"\nDone! white={len(white)} black={len(black)} | debug.txt: white_raw={len(white_raw)} black_raw={len(black_raw)}")
          EOF

      - name: Commit changes
        run: |
          git config user.email "bot@vpnservice.local"
          git config user.name "VPN Sync Bot"
          git add white_servers.txt black_servers.txt debug.txt
          git diff --staged --quiet || git commit -m "sync: $(date '+%Y-%m-%d %H:%M UTC')"
          git push
