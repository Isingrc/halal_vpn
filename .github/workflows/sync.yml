name: Sync VPN Configs

on:
  schedule:
    - cron: '*/10 * * * *'   # проверяем каждые 10 минут, обновляем только если есть новый коммит в источнике
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Check if source repo has new commit
        id: check
        run: |
          LATEST_SHA=$(curl -s "https://api.github.com/repos/igareck/vpn-configs-for-russia/commits/main" | python3 -c "import sys,json; print(json.load(sys.stdin).get('sha',''))")
          echo "Latest source SHA: $LATEST_SHA"

          if [ -f "last_sha.txt" ]; then
            SAVED_SHA=$(cat last_sha.txt)
          else
            SAVED_SHA=""
          fi
          echo "Saved SHA: $SAVED_SHA"

          if [ "$LATEST_SHA" == "$SAVED_SHA" ] && [ -n "$SAVED_SHA" ]; then
            echo "No changes in source repo, skipping."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Source repo changed, running sync."
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "$LATEST_SHA" > last_sha.txt
          fi

      - name: Fetch, ping-sort and build config files
        if: steps.check.outputs.changed == 'true'
        run: |
          python3 << 'EOF'
          import urllib.request
          import re
          import subprocess
          from datetime import datetime

          BASE = "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/"
          DATE = datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")

          WHITE_SOURCES = [
              "WHITE-CIDR-RU-all.txt",
              "WHITE-CIDR-RU-checked.txt",
              "WHITE-SNI-RU-all.txt",
              "Vless-Reality-White-Lists-Rus-Mobile.txt",
              "Vless-Reality-White-Lists-Rus-Mobile-2.txt",
          ]
          BLACK_SOURCES = [
              "BLACK_VLESS_RUS.txt",
              "BLACK_VLESS_RUS_mobile.txt",
              "BLACK_SS+All_RUS.txt",
          ]

          PROTOCOLS = ("vless://", "vmess://", "trojan://", "ss://", "hysteria2://", "tuic://")

          MAX_PER_GROUP = 55
          PING_DOMAIN   = "telegram.org"
          MAX_REACHABLE_MS = 900

          def fetch(filename):
              try:
                  with urllib.request.urlopen(BASE + filename, timeout=20) as r:
                      return r.read().decode("utf-8").splitlines()
              except Exception as e:
                  print(f"  ERROR {filename}: {e}")
                  return []

          def is_vpn_line(line):
              return any(line.startswith(p) for p in PROTOCOLS)

          def is_anycast(line):
              name_part = line.split("#", 1)[1] if "#" in line else ""
              return "anycast" in name_part.lower()

          from urllib.parse import unquote

          def extract_flag(name):
              """
              Ищем emoji флаг (unicode regional indicators) в названии.
              Сначала декодируем URL-encoding, затем ищем пару regional indicator символов.
              Работает для ЛЮБОЙ страны автоматически, не только из списка.
              """
              try:
                  decoded = unquote(name)
              except Exception:
                  decoded = name

              # Regional Indicator Symbols: U+1F1E6 (A) .. U+1F1FF (Z)
              codepoints = [ord(ch) for ch in decoded]
              for i in range(len(codepoints) - 1):
                  a, b = codepoints[i], codepoints[i + 1]
                  if 0x1F1E6 <= a <= 0x1F1FF and 0x1F1E6 <= b <= 0x1F1FF:
                      flag = decoded[i] + decoded[i + 1]
                      code = chr(a - 0x1F1E6 + ord('A')) + chr(b - 0x1F1E6 + ord('A'))
                      return flag, code

              return "🌐", "XX"

          def get_ip(line):
              m = re.search(r'@([a-zA-Z0-9._-]+):', line)
              return m.group(1) if m else None

          def ping_via_telegram(host):
              try:
                  result = subprocess.run(
                      ["curl", "-o", "/dev/null", "-s", "-w", "%{time_total}",
                       "--max-time", "5", "--connect-timeout", "3",
                       "--resolve", f"{PING_DOMAIN}:443:{host}",
                       f"https://{PING_DOMAIN}"],
                      capture_output=True, text=True, timeout=10
                  )
                  val = result.stdout.strip()
                  if val:
                      return float(val) * 1000
              except:
                  pass
              try:
                  result = subprocess.run(["ping", "-c", "2", "-W", "2", host],
                                           capture_output=True, text=True, timeout=8)
                  for line in result.stdout.split("\n"):
                      if "avg" in line or "rtt" in line:
                          parts = line.split("/")
                          if len(parts) >= 5:
                              return float(parts[4])
              except:
                  pass
              return 9999.0

          def fetch_group(sources, is_white=False):
              all_lines, seen = [], set()
              for filename in sources:
                  print(f"  Fetching {filename}...")
                  for l in fetch(filename):
                      l = l.strip()
                      if not l or l.startswith("#") or not is_vpn_line(l):
                          continue
                      if is_anycast(l):
                          continue
                      base = re.sub(r'#.*$', '', l).strip()
                      if base in seen:
                          continue
                      seen.add(base)
                      all_lines.append(l)
              return all_lines

          def sort_and_filter(lines, max_check=80, count=MAX_PER_GROUP):
              candidates = lines[:max_check]
              scored = []
              for line in candidates:
                  host = get_ip(line)
                  p = ping_via_telegram(host) if host else 9999.0
                  print(f"    {host} -> {PING_DOMAIN}: {p:.0f}ms")
                  scored.append((p, line))
              working = [(p, l) for p, l in scored if p < MAX_REACHABLE_MS]
              working.sort(key=lambda x: x[0])
              result = [l for _, l in working][:count]
              print(f"    Working: {len(working)}/{len(scored)} checked -> keeping top {len(result)}")
              return result

          def rename_short(lines, label):
              """
              Короткое имя: флаг + код страны + label (White/Black) + номер.
              Флаг берём из оригинального названия если он там есть, иначе 🌐.
              """
              result = []
              for i, line in enumerate(lines, 1):
                  original_name = line.split("#", 1)[1] if "#" in line else ""
                  flag, code = extract_flag(original_name)
                  new_name = f"{flag} {code} {label} #{i}"
                  base = re.sub(r'#.*$', '', line).rstrip()
                  result.append(base + "#" + new_name)
              return result

          def write_single(path, header, servers):
              with open(path, "w", encoding="utf-8") as f:
                  f.write(f"# {header}\n# Updated: {DATE}\n# Total: {len(servers)} servers\n\n")
                  f.write("\n".join(servers) + "\n")

          print("Fetching WHITE sources...")
          white_raw = fetch_group(WHITE_SOURCES, is_white=True)
          print(f"  WHITE raw (after anycast filter): {len(white_raw)} keys")

          print("Fetching BLACK sources...")
          black_raw = fetch_group(BLACK_SOURCES, is_white=False)
          print(f"  BLACK raw (after anycast filter): {len(black_raw)} keys")

          print(f"Checking WHITE servers (max {MAX_PER_GROUP} working)...")
          white_checked = sort_and_filter(white_raw, max_check=min(80, len(white_raw)), count=MAX_PER_GROUP)
          white = rename_short(white_checked, "White")

          print(f"Checking BLACK servers (max {MAX_PER_GROUP} working)...")
          black_checked = sort_and_filter(black_raw, max_check=min(80, len(black_raw)), count=MAX_PER_GROUP)
          black = rename_short(black_checked, "Black")

          print("Writing files...")
          write_single("white_servers.txt", "WHITE SERVERS", white)
          write_single("black_servers.txt", "BLACK SERVERS", black)

          with open("debug.txt", "w", encoding="utf-8") as f:
              f.write(f"# DEBUG — все сервера из источника (без ping-фильтра, оригинальные названия)\n")
              f.write(f"# Updated: {DATE}\n")
              f.write(f"# WHITE raw: {len(white_raw)} | BLACK raw: {len(black_raw)}\n\n")
              f.write("# === WHITE RAW ===\n")
              f.write("\n".join(white_raw) + "\n\n")
              f.write("# === BLACK RAW ===\n")
              f.write("\n".join(black_raw) + "\n")

          print(f"\nDone! white={len(white)} black={len(black)}")
          EOF

      - name: Commit changes
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.email "bot@vpnservice.local"
          git config user.name "VPN Sync Bot"
          git add white_servers.txt black_servers.txt debug.txt last_sha.txt
          git diff --staged --quiet || git commit -m "sync: $(date '+%Y-%m-%d %H:%M UTC')"
          git push
